<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>아시아리그 팀원 경매</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#07111f;--card:#0f1b2e;--line:#29415f;--text:#eaf4ff;--muted:#9fb4cd;--accent:#38bdf8;--gold:#facc15;--danger:#fb7185;--ok:#34d399;--warn:#f59e0b;--red:#ff4d6d}
    *{box-sizing:border-box}
    html,body{min-width:1180px}
    body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:#07111f;color:var(--text);font-size:14px}
    button,input,select{font-family:inherit}
    button{cursor:pointer;border:0;border-radius:11px;padding:9px 13px;font-weight:900;color:#07111f;background:var(--accent)}
    button:disabled{opacity:.45;cursor:not-allowed}
    .ghost{background:#1d314e;color:var(--text);border:1px solid var(--line)}
    .gold{background:var(--gold);color:#251a00}
    .danger{background:var(--danger);color:white}
    .ok{background:var(--ok);color:#052014}
    .warn{background:var(--warn);color:#231300}
    .wrap{width:1180px;margin:0 auto;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .title h1{margin:0;font-size:28px}
    .title p{margin:6px 0 0;color:#9cc7f7}
    .topBtns{display:flex;gap:8px;align-items:center}
    .badge{display:inline-flex;align-items:center;border:1px solid var(--line);background:#10213a;border-radius:999px;padding:7px 10px;color:#b9d7ff;font-weight:900;white-space:nowrap}
    .card{background:rgba(15,27,46,.96);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:0 10px 25px rgba(0,0,0,.22)}
    .card h2{margin:0;font-size:18px}
    .sectionHead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
    .tinyBadge{display:inline-flex;align-items:center;border:1px solid var(--line);background:#10213a;border-radius:999px;padding:5px 9px;color:#b9d7ff;font-size:12px;font-weight:900;white-space:nowrap}
    .muted{color:var(--muted)}
    .loginRow{display:grid;grid-template-columns:150px 170px 90px 1fr;gap:8px;align-items:end}
    .loginRow input,.loginRow select,.bidBox input,.modal input,.adminGrid input{width:100%;background:#081525;border:1px solid var(--line);border-radius:11px;color:var(--text);padding:10px;font-size:14px}
    .loginRow label{display:block;margin:0 0 5px;color:var(--muted)}
    .mainGrid{display:grid;grid-template-columns:555px 1fr;gap:12px;margin-top:12px}
    .captains{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .captain{background:#0b1728;border:1px solid var(--line);border-radius:13px;padding:10px 6px;text-align:center}
    .captain.on{border-color:#ef4444;box-shadow:0 0 0 1px rgba(239,68,68,.58),0 0 13px rgba(239,68,68,.22)}
    .coin{font-size:22px;color:var(--gold);font-weight:1000;line-height:1}
    .small{font-size:12px;color:#b9d7ff}
    .playersGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .playerItem{position:relative;min-height:39px;border:1px solid var(--line);background:#0b1728;border-radius:10px;padding:6px 8px;display:flex;align-items:center;justify-content:center;font-weight:900}
    .playerItem .num{position:absolute;left:8px;top:4px;font-size:11px;color:#9fb4cd}
    .playerItem.now{border-color:#f5e500;background:#243916;box-shadow:0 0 0 1px rgba(250,204,21,.35)}
    .playerItem.sold{opacity:.55;text-decoration:line-through}
    .playerItem.sold:after{content:'X';position:absolute;font-size:30px;color:#ff4d6d;font-weight:1000;opacity:.8}
    .auctionNow{display:grid;grid-template-columns:140px 1fr;gap:12px;align-items:center}
    .playerBox{height:135px;border-radius:18px;background:linear-gradient(135deg,#3155f4,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:1000}
    .timer{font-size:48px;font-weight:1000;color:var(--gold);line-height:1}
    .highest{margin-top:8px;font-size:17px;color:#b9d7ff}
    .highestName{color:#34d399;font-weight:1000}
    .highestAmount{color:#facc15;font-size:21px;font-weight:1000;text-shadow:0 0 8px rgba(250,204,21,.35)}
    .bidBox{display:grid;grid-template-columns:1fr 115px 115px;gap:8px;margin-top:12px}
    .teams{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .team{background:#0b1728;border:1px solid var(--line);border-radius:13px;padding:10px;min-height:110px}
    .team h3{margin:0 0 7px;color:#38bdf8}
    .member{padding:6px 8px;margin:5px 0;background:#13243d;border-radius:9px;display:flex;justify-content:space-between;gap:6px;font-weight:800}
    .log{height:176px;overflow:auto;background:#081525;border:1px solid var(--line);border-radius:12px;padding:8px}
    .log div{padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.08);color:#ff4d6d;font-weight:900}
    .logCoin{color:#facc15!important;font-size:1.18em;font-weight:1000;text-shadow:0 0 8px rgba(250,204,21,.35)}
    .errorBox{border:1px solid var(--danger);background:rgba(251,113,133,.13);padding:10px;border-radius:12px;margin-bottom:10px;color:#ffd7de;white-space:pre-wrap}
    .modalBg{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:20}
    .modal{width:620px;background:#0f1b2e;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .adminGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
    .adminGrid label{display:block;margin-bottom:4px;color:#b9d7ff;font-weight:900}
    .adminPwBox{display:grid;grid-template-columns:1fr 90px 90px;gap:8px;margin-top:12px}
    .adminPwBox input{width:100%;background:#081525;border:1px solid var(--line);border-radius:11px;color:var(--text);padding:10px;font-size:14px}
  </style>
</head>
<body>
<div id="app"><div class="wrap">불러오는 중...</div></div>
<div id="modalRoot"></div>

<script>
const SUPABASE_URL = 'https://xyibdanmecakevhtdajl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_uvYqwDymxodcSdpT1zAWyg_PeVHh_ZO';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CAPTAINS=[
  {name:'노을',password:'1235'},
  {name:'음',password:'5123'},
  {name:'상호',password:'2635'},
  {name:'구리',password:'7463'},
  {name:'시크릿',password:'6352'}
];
const PLAYERS=['둘리','로딩','제로','라곤','네오','줄리엣','키라','로버','흠','미신트','짱이','이뚜','헬츠','브칠','미또'];

const ADMIN_PASSWORD='0473';
const START_COINS=1000;
const BID_STEP=10;
const ROUND_SECONDS=30;
const PROCESSING_STUCK_MS=650;
const TEAM_SIZE=3;
const SOUND_NEXT='https://github.com/jangseok895-glitch/asia-ox-sound/raw/refs/heads/main/%EB%9D%B5%EB%8F%99.mp3';
const SOUND_COUNT='https://github.com/jangseok895-glitch/asia-ox-sound/raw/refs/heads/main/5%EC%B9%B4%EC%9A%B4%ED%8A%B8.mp3';

let me=JSON.parse(localStorage.getItem('auction_me')||'null');
let visitorId=localStorage.getItem('auction_visitor_id');
if(!visitorId){visitorId=crypto.randomUUID();localStorage.setItem('auction_visitor_id',visitorId)}

let state={id:1,current_index:0,status:'waiting',round_started_at:null,paused_remaining:ROUND_SECONDS};
let captains=[],bids=[],logs=[],teams=[],visitorCount=0,lastError='',finishing=false,lastFinishedKey='',processingSeenAt=0,lastSeenRoundKey='';
let lastRoundKeyForNextSound='', lastRoundKeyForCountSound='', finishRoundPromise=null, finishStartedAt=0;
let audioUnlocked=false;
const audioNext=new Audio(SOUND_NEXT);
const audioCount=new Audio(SOUND_COUNT);
audioNext.preload='auto'; audioCount.preload='auto';
const app=document.getElementById('app'), modalRoot=document.getElementById('modalRoot');
const $=s=>document.querySelector(s);
const nowIso=()=>new Date().toISOString();
const money=n=>Number(n||0).toLocaleString('ko-KR');
const isEditing=()=>['INPUT','SELECT','TEXTAREA'].includes(document.activeElement?.tagName);

function toast(m){alert(m)}
function unlockAudio(){
  if(audioUnlocked) return;
  audioUnlocked=true;
  [audioNext,audioCount].forEach(a=>{try{a.volume=0.85; const p=a.play(); if(p&&p.then)p.then(()=>{a.pause();a.currentTime=0}).catch(()=>{});}catch(e){}});
}
function playSound(kind){
  if(!audioUnlocked) return;
  try{
    const a=kind==='count'?audioCount:audioNext;
    a.pause(); a.currentTime=0;
    const p=a.play(); if(p&&p.catch)p.catch(()=>{});
  }catch(e){}
}
document.addEventListener('click', unlockAudio, {once:true});
document.addEventListener('keydown', unlockAudio, {once:true});
function escapeHtml(v){return String(v??'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function q(p,w){return p.then(r=>{if(r.error)throw new Error(`${w}: ${r.error.message}`);return r.data})}
function showErr(where,e){console.error(where,e);lastError=`${where}: ${e.message||e}`;render()}
function cleanMsg(m){return String(m||'').replace(/^\[(경매|접속)\]\s*/,'')}
function isAuctionMsg(m){return String(m||'').startsWith('[경매]') || /(경매 시작|입찰|낙찰|유찰|리셋|정지|재개|랜덤 배정|경매 종료)/.test(String(m||''))}
function formatAuctionLogMessage(message){
  const safe=escapeHtml(cleanMsg(message));
  return safe.replace(/(\d{1,3}(?:,\d{3})*|\d+)(?=\s*(?:coin|입찰|낙찰))/g,'<span class="logCoin">$1</span>');
}
function uniqueLogs(arr){
  const seen=new Set(), out=[];
  for(const l of arr){
    if(!isAuctionMsg(l.message)) continue;
    const key=cleanMsg(l.message);
    if(seen.has(key)) continue;
    seen.add(key);
    out.push(l);
  }
  return out.slice(0,70);
}
async function addAuctionLog(message){
  const full=`[경매] ${message}`;
  try{
    const since=new Date(Date.now()-5000).toISOString();
    const recent=await q(sb.from('auction_logs').select('id').eq('message',full).gte('created_at',since).limit(1),'로그 중복 확인');
    if(recent.length) return;
    await q(sb.from('auction_logs').insert({message:full}),'경매 로그 저장');
  }catch(e){console.warn(e)}
}
async function visitorHeartbeat(){
  try{await sb.from('auction_visitors').upsert({id:visitorId,last_seen:nowIso()},{onConflict:'id'})}catch(e){}
}
async function loadVisitorCount(){
  try{
    const cutoff=new Date(Date.now()-25000).toISOString();
    const r=await sb.from('auction_visitors').select('id',{count:'exact',head:true}).gte('last_seen',cutoff);
    if(!r.error) visitorCount=r.count||0;
  }catch(e){visitorCount=0}
}
async function ensureData(){
  try{
    let st=await q(sb.from('auction_state').select('*').eq('id',1).maybeSingle(),'상태 확인');
    if(!st) await q(sb.from('auction_state').insert({id:1,current_index:0,status:'waiting',round_started_at:null,paused_remaining:ROUND_SECONDS}),'상태 생성');
    const cs=await q(sb.from('auction_captains').select('*'),'주장 확인');
    if(!cs||cs.length<5){
      for(const c of CAPTAINS){
        await q(sb.from('auction_captains').upsert({name:c.name,coins:START_COINS,online:false,session_id:null},{onConflict:'name'}),`${c.name} 생성`);
      }
    }
  }catch(e){showErr('초기 데이터 준비 실패',e)}
}
async function loadAll(skipRender=false){
  try{
    const [st,cs,bd,lg,tm]=await Promise.all([
      q(sb.from('auction_state').select('*').eq('id',1).single(),'상태 불러오기'),
      q(sb.from('auction_captains').select('*').order('id'),'주장 불러오기'),
      q(sb.from('auction_bids').select('*').order('amount',{ascending:false}).order('created_at',{ascending:true}),'입찰 불러오기'),
      q(sb.from('auction_logs').select('*').order('id',{ascending:false}).limit(150),'경매 로그 불러오기'),
      q(sb.from('auction_teams').select('*').order('sold_order'),'팀 불러오기')
    ]);
    const prevRoundKey = state ? `${state.status}_${state.current_index}_${state.round_started_at||''}` : '';
    state=st||state; captains=cs||[]; bids=bd||[]; logs=lg||[]; teams=tm||[];
    const newRoundKey = `${state.status}_${state.current_index}_${state.round_started_at||''}`;
    if(state.status==='running' && state.round_started_at && newRoundKey!==prevRoundKey && newRoundKey!==lastRoundKeyForNextSound){
      lastRoundKeyForNextSound=newRoundKey;
      lastRoundKeyForCountSound='';
      playSound('next');
    }
    await loadVisitorCount(); lastError='';
    if(!skipRender && !isEditing()) render();
  }catch(e){showErr('데이터 불러오기 실패',e)}
}

function rawSoldTeams(){
  return teams.filter(t=>t.captain_name && Number(t.price)>0);
}
function soldTeams(){
  const map=new Map();
  for(const t of rawSoldTeams()){
    const old=map.get(t.player_name);
    if(!old || Number(t.sold_order||0)<Number(old.sold_order||0)) map.set(t.player_name,t);
  }
  return [...map.values()].sort((a,b)=>Number(a.sold_order||0)-Number(b.sold_order||0));
}
function soldPlayers(){return new Set(soldTeams().map(t=>t.player_name))}
function captainTeamCount(name){return soldTeams().filter(t=>t.captain_name===name).length}
function allTeamsFull(){return CAPTAINS.every(c=>captainTeamCount(c.name)>=TEAM_SIZE)}
function nextUnsoldIndex(afterIndex){
  const sold=soldPlayers();
  for(let step=1;step<=PLAYERS.length;step++){
    const idx=(afterIndex+step+PLAYERS.length)%PLAYERS.length;
    if(!sold.has(PLAYERS[idx])) return idx;
  }
  return -1;
}
function currentPlayer(){
  if(PLAYERS[state.current_index] && !soldPlayers().has(PLAYERS[state.current_index])) return PLAYERS[state.current_index];
  const idx=nextUnsoldIndex((state.current_index||0)-1);
  return idx>=0?PLAYERS[idx]:PLAYERS[0];
}
function clampRemaining(v){
  const n=Number(v);
  if(!Number.isFinite(n)) return ROUND_SECONDS;
  return Math.max(0, Math.min(ROUND_SECONDS, n));
}
function remainingSeconds(){
  if(state.status==='paused') return clampRemaining(state.paused_remaining);
  if(state.status!=='running') return clampRemaining(state.paused_remaining);
  if(!state.round_started_at) return ROUND_SECONDS;
  const started=new Date(state.round_started_at).getTime();
  if(!Number.isFinite(started)) return ROUND_SECONDS;
  return Math.max(0, Math.min(ROUND_SECONDS, ROUND_SECONDS-Math.floor((Date.now()-started)/1000)));
}
function highestBid(){
  const p=currentPlayer();
  return bids.filter(b=>b.player_name===p).sort((a,b)=>Number(b.amount)-Number(a.amount)||new Date(a.created_at)-new Date(b.created_at))[0]||null;
}
function myCaptain(){return captains.find(c=>c.name===me?.name)}
function canBid(){
  const c=myCaptain();
  return !!(me&&c&&state.status==='running'&&!soldPlayers().has(currentPlayer())&&Number(c.coins)>=BID_STEP&&captainTeamCount(c.name)<TEAM_SIZE);
}

async function login(){
  const name=$('#loginName').value,pw=$('#loginPw').value;
  const ok=CAPTAINS.find(c=>c.name===name&&c.password===pw);
  if(!ok) return toast('주장 선택 또는 비밀번호가 맞지 않습니다.');
  try{
    const sessionId=crypto.randomUUID();
    await q(sb.from('auction_captains').update({online:true,session_id:sessionId,last_seen:nowIso()}).eq('name',name),'로그인');
    me={name,sessionId};
    localStorage.setItem('auction_me',JSON.stringify(me));
    await loadAll();
  }catch(e){showErr('로그인 실패',e)}
}
async function logout(){
  try{
    if(me) await q(sb.from('auction_captains').update({online:false,session_id:null}).eq('name',me.name).eq('session_id',me.sessionId),'로그아웃');
  }catch(e){}
  localStorage.removeItem('auction_me'); me=null; await loadAll();
}
async function heartbeat(){
  if(!me) return;
  const cap=captains.find(c=>c.name===me.name);
  if(cap&&cap.session_id&&cap.session_id!==me.sessionId){
    localStorage.removeItem('auction_me'); me=null;
    toast('다른 곳에서 다시 로그인되어 현재 접속은 종료됩니다.');
    loadAll(); return;
  }
  try{await sb.from('auction_captains').update({online:true,last_seen:nowIso()}).eq('name',me.name).eq('session_id',me.sessionId)}catch(e){}
}

function askAdminPassword(){
  return new Promise(resolve=>{
    modalRoot.innerHTML=`<div class="modalBg"><div class="modal" style="width:420px">
      <div class="sectionHead"><h2>운영진 비밀번호</h2><button class="ghost" onclick="closeAdminPassword(false)">닫기</button></div>
      <p class="muted" style="margin:0">운영진 비밀번호를 입력하세요.</p>
      <div class="adminPwBox">
        <input id="adminPwInput" type="password" placeholder="비밀번호" autocomplete="off" onkeydown="if(event.key==='Enter') closeAdminPassword(true)">
        <button class="gold" onclick="closeAdminPassword(true)">확인</button>
        <button class="ghost" onclick="closeAdminPassword(false)">취소</button>
      </div>
    </div></div>`;
    window._adminPwResolve=resolve;
    setTimeout(()=>document.getElementById('adminPwInput')?.focus(),0);
  });
}
function closeAdminPassword(ok){
  const pw=document.getElementById('adminPwInput')?.value||'';
  modalRoot.innerHTML='';
  const resolve=window._adminPwResolve;
  window._adminPwResolve=null;
  if(!resolve) return;
  if(!ok) return resolve(false);
  if(pw!==ADMIN_PASSWORD){toast('운영진 비밀번호가 맞지 않습니다.');return resolve(false)}
  return resolve(true);
}
async function promptStart(){ if(await askAdminPassword()) await startAuction(); }
function openAdmin(){
  // 운영진 패널 입장 자체는 비밀번호 없이 열립니다.
  // 실제 버튼을 누를 때마다 비밀번호를 확인합니다.
  modalRoot.innerHTML=`<div class="modalBg"><div class="modal">
    <div class="sectionHead"><h2>운영진 패널</h2><button class="ghost" onclick="closeAdmin()">닫기</button></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="gold" onclick="promptStart()">경매 시작</button>
      <button class="danger" onclick="resetAll()">모든리셋</button>
      <button class="warn" onclick="pauseAuction()">정지</button>
      <button class="ok" onclick="resumeAuction()">재개</button>
    </div>
    <div class="adminGrid">${captains.map(c=>`<div><label>${c.name}</label><input id="coin_${c.name}" type="number" value="${c.coins}"><button onclick="editCoin('${c.name}')">수정</button></div>`).join('')}</div>
  </div></div>`;
}
function closeAdmin(){modalRoot.innerHTML=''}

async function startAuction(){
  try{
    await loadAll(true);
    if(allTeamsFull()) return await endAuction();
    let idx=state.current_index||0;
    if(soldPlayers().has(PLAYERS[idx])) idx=nextUnsoldIndex(idx-1);
    if(idx<0) return await endAuction();
    await q(sb.from('auction_state').update({status:'running',current_index:idx,round_started_at:nowIso(),paused_remaining:ROUND_SECONDS}).eq('id',1),'경매 시작');
    await addAuctionLog('경매 시작');
    await loadAll();
  }catch(e){showErr('경매 시작 실패',e)}
}
async function placeBid(){
  const cap=myCaptain(); if(!cap) return;
  const hi=highestBid(); const next=hi?Number(hi.amount)+BID_STEP:BID_STEP;
  if(!canBid()) return toast('입찰할 수 없습니다.');
  if(Number(cap.coins)<next) return toast('보유 coin 이 부족합니다.');
  if(hi?.captain_name===cap.name) return toast('이미 본인이 최고 입찰자입니다.');
  try{
    await q(sb.from('auction_bids').insert({player_name:currentPlayer(),captain_name:cap.name,amount:next}),'입찰 저장');
    await q(sb.from('auction_state').update({round_started_at:nowIso(),paused_remaining:ROUND_SECONDS}).eq('id',1),'시간 초기화');
    await addAuctionLog(`${cap.name}님 ${next} 입찰`);
    await loadAll();
  }catch(e){showErr('입찰 실패',e)}
}
async function customBid(){
  const cap=myCaptain(); const raw=Number($('#customBid').value); const val=Math.floor(raw/10)*10;
  const hi=highestBid(); const min=hi?Number(hi.amount)+BID_STEP:BID_STEP;
  if(!val||val<min) return toast(`최소 ${min} coin 이상 입찰해야 합니다.`);
  if(!canBid()) return toast('입찰할 수 없습니다.');
  if(Number(cap.coins)<val) return toast('보유 coin 이 부족합니다.');
  if(hi?.captain_name===cap.name) return toast('이미 본인이 최고 입찰자입니다.');
  try{
    await q(sb.from('auction_bids').insert({player_name:currentPlayer(),captain_name:cap.name,amount:val}),'입찰 저장');
    await q(sb.from('auction_state').update({round_started_at:nowIso(),paused_remaining:ROUND_SECONDS}).eq('id',1),'시간 초기화');
    await addAuctionLog(`${cap.name}님 ${val} 입찰`);
    const input=$('#customBid'); if(input) input.value='';
    await loadAll();
  }catch(e){showErr('입찰 실패',e)}
}
function groupNameByCaptain(name){return ['A조','B조','C조','D조','E조'][CAPTAINS.findIndex(c=>c.name===name)]||'미정'}

async function getFreshSoldTeams(){
  const rows=await q(sb.from('auction_teams').select('*').not('captain_name','is',null).gt('price',0).order('sold_order'), '팀 최신 확인');
  const map=new Map();
  for(const t of rows||[]){
    const old=map.get(t.player_name);
    if(!old || Number(t.sold_order||0)<Number(old.sold_order||0)) map.set(t.player_name,t);
  }
  return [...map.values()];
}
function nextUnsoldIndexFrom(afterIndex, freshSold){
  const sold=new Set((freshSold||soldTeams()).map(t=>t.player_name));
  for(let step=1;step<=PLAYERS.length;step++){
    const idx=(afterIndex+step+PLAYERS.length)%PLAYERS.length;
    if(!sold.has(PLAYERS[idx])) return idx;
  }
  return -1;
}
function captainTeamCountFrom(name, freshSold){
  return (freshSold||soldTeams()).filter(t=>t.captain_name===name).length;
}
function allTeamsFullFrom(freshSold){
  return CAPTAINS.every(c=>captainTeamCountFrom(c.name,freshSold)>=TEAM_SIZE);
}
function nextSoldOrderFrom(freshSold){
  const nums=(freshSold||[]).map(t=>Number(t.sold_order||0)).filter(n=>Number.isFinite(n));
  const max=nums.length?Math.max(...nums):0;
  return max+1; // sold_order는 int4라 Date.now() 같은 큰 숫자를 넣으면 오류가 납니다.
}

async function completeRoundAndMove(localIndex, reason='normal'){
  let logMessage='';
  let player=PLAYERS[localIndex];
  let freshSold=await getFreshSoldTeams();

  if(!player || freshSold.some(t=>t.player_name===player)){
    const ni=nextUnsoldIndexFrom(localIndex, freshSold);
    if(ni<0 || allTeamsFullFrom(freshSold)){
      await q(sb.from('auction_state').update({status:'ended',round_started_at:null,paused_remaining:0}).eq('id',1),'종료');
    }else{
      await q(sb.from('auction_state').update({status:'running',current_index:ni,round_started_at:nowIso(),paused_remaining:ROUND_SECONDS}).eq('id',1),'다음 선수');
    }
    return;
  }

  const fresh=await q(
    sb.from('auction_bids')
      .select('*')
      .eq('player_name',player)
      .order('amount',{ascending:false})
      .order('created_at',{ascending:true})
      .limit(1),
    '최고 입찰 확인'
  );
  const hi=fresh[0];

  if(hi){
    const price=Number(hi.amount);
    let cap=captains.find(c=>c.name===hi.captain_name);
    if(!cap) cap=await q(sb.from('auction_captains').select('*').eq('name',hi.captain_name).single(), '낙찰 주장 확인');

    freshSold=await getFreshSoldTeams();
    const alreadySold=freshSold.some(t=>t.player_name===player);
    const winnerFull=captainTeamCountFrom(hi.captain_name,freshSold)>=TEAM_SIZE;
    const coinEnough=Number(cap?.coins||0)>=price;

    if(!alreadySold && !winnerFull && coinEnough){
      const order=nextSoldOrderFrom(freshSold);
      await q(
        sb.from('auction_teams')
          .insert({captain_name:hi.captain_name,player_name:player,price,group_name:groupNameByCaptain(hi.captain_name),sold_order:order})
          .select('id'),
        '낙찰 저장'
      );
      await q(sb.from('auction_captains').update({coins:Math.max(0,Number(cap.coins)-price)}).eq('name',hi.captain_name),'코인 차감');
      freshSold=[...freshSold,{captain_name:hi.captain_name,player_name:player,price,group_name:groupNameByCaptain(hi.captain_name),sold_order:order}];
      logMessage=`${player} 낙찰: ${hi.captain_name}님 ${price} 낙찰`;
    }else{
      logMessage=`${player} 유찰`;
    }
  }else{
    logMessage=`${player} 유찰`;
  }

  // 가장 중요한 부분: 로그보다 상태 전환을 먼저 합니다.
  if(allTeamsFullFrom(freshSold)){
    await q(sb.from('auction_state').update({status:'ended',round_started_at:null,paused_remaining:0}).eq('id',1),'종료');
  }else{
    const ni=nextUnsoldIndexFrom(localIndex, freshSold);
    if(ni<0){
      await q(sb.from('auction_state').update({status:'ended',round_started_at:null,paused_remaining:0}).eq('id',1),'종료');
    }else{
      await q(sb.from('auction_state').update({status:'running',current_index:ni,round_started_at:nowIso(),paused_remaining:ROUND_SECONDS}).eq('id',1),'다음 선수');
    }
  }
  if(logMessage) addAuctionLog(logMessage);
}

async function finishRound(){
  if(state.status!=='running'||remainingSeconds()>0) return;
  if(finishing) return;

  const localIndex=state.current_index;
  const localStartedAt=state.round_started_at;
  const finishKey=`${localIndex}_${localStartedAt}`;
  if(lastFinishedKey===finishKey) return;

  finishing=true;
  lastFinishedKey=finishKey;
  if(!isEditing()) render();

  try{
    // DB에는 아주 짧은 잠금만 겁니다. 여러 접속자가 동시에 0초를 감지해도 한 명만 통과합니다.
    const lock=await q(
      sb.from('auction_state')
        .update({status:'processing',round_started_at:nowIso(),paused_remaining:0})
        .eq('id',1)
        .eq('status','running')
        .eq('current_index',localIndex)
        .eq('round_started_at',localStartedAt)
        .select('id'),
      '라운드 잠금'
    );
    if(!lock.length){ finishing=false; return; }

    await completeRoundAndMove(localIndex, 'finish');
    processingSeenAt=0;
    await loadAll();
  }catch(e){
    console.warn('라운드 종료 복구 처리', e);
    // 오류가 나도 processing에 방치하지 않고 무조건 다음 상태로 돌립니다.
    try{
      const freshSold=await getFreshSoldTeams();
      const ni=nextUnsoldIndexFrom(localIndex, freshSold);
      if(ni>=0 && !allTeamsFullFrom(freshSold)){
        await sb.from('auction_state').update({status:'running',current_index:ni,round_started_at:nowIso(),paused_remaining:ROUND_SECONDS}).eq('id',1);
      }else{
        await sb.from('auction_state').update({status:'ended',round_started_at:null,paused_remaining:0}).eq('id',1);
      }
      lastError='';
      await loadAll();
    }catch(e2){
      showErr('라운드 복구 실패',e2);
    }
  }finally{
    finishing=false;
    finishRoundPromise=null;
    finishStartedAt=0;
  }
}

async function endAuction(){
  await q(sb.from('auction_state').update({status:'ended',round_started_at:null}).eq('id',1),'종료');
  await addAuctionLog('경매 종료');
}
async function resetAll(){
  if(!await askAdminPassword()) return;
  if(!confirm('정말 모든 경매를 초기화할까요?\n※ 로그인된 주장들은 로그아웃되지 않습니다.')) return;
  try{
    await Promise.all([
      q(sb.from('auction_bids').delete().neq('id',0),'입찰 삭제'),
      q(sb.from('auction_logs').delete().neq('id',0),'로그 삭제'),
      q(sb.from('auction_teams').delete().neq('id',0),'팀 삭제')
    ]);
    for(const c of CAPTAINS){
      await q(sb.from('auction_captains').update({coins:START_COINS}).eq('name',c.name),'주장 coin 초기화');
    }
    await q(sb.from('auction_state').update({current_index:0,status:'waiting',round_started_at:null,paused_remaining:ROUND_SECONDS}).eq('id',1),'상태 초기화');
    lastFinishedKey=''; processingSeenAt=0; finishRoundPromise=null; finishStartedAt=0; finishing=false;
    await addAuctionLog('운영진 전체 리셋');
    closeAdmin(); await loadAll();
  }catch(e){showErr('리셋 실패',e)}
}
async function pauseAuction(){
  if(!await askAdminPassword()) return;
  await q(sb.from('auction_state').update({status:'paused',paused_remaining:remainingSeconds(),round_started_at:null}).eq('id',1),'정지');
  await addAuctionLog('경매 정지'); await loadAll();
}
async function resumeAuction(){
  if(!await askAdminPassword()) return;
  const ni=soldPlayers().has(PLAYERS[state.current_index])?nextUnsoldIndex(state.current_index-1):state.current_index;
  const remain=clampRemaining(state.paused_remaining);
  const passed=ROUND_SECONDS-remain;
  await q(sb.from('auction_state').update({status:'running',current_index:ni>=0?ni:0,round_started_at:new Date(Date.now()-passed*1000).toISOString(),paused_remaining:remain}).eq('id',1),'재개');
  await addAuctionLog('경매 재개'); await loadAll();
}
async function editCoin(name){
  if(!await askAdminPassword()) return;
  const v=Number(document.getElementById('coin_'+name).value);
  if(Number.isNaN(v)||v<0) return;
  await q(sb.from('auction_captains').update({coins:v}).eq('name',name),'코인 수정');
  await loadAll();
}

  app.innerHTML=`<div class="wrap">

    <div class="top">

          <div class="captains">${captains.map(c=>`<div class="captain ${c.online?'on':''}"><b>${c.name}</b><div class="coin">${money(c.coins)}</div><div class="small">${c.online?'🟢 접속중':'⚪ 오프라인'}</div></div>`).join('')}</div>

async function recoverProcessingIfStuck(force=false){
  if(state.status!=='processing') { processingSeenAt=0; return; }
  if(!processingSeenAt) processingSeenAt=Date.now();
  if(!force && Date.now()-processingSeenAt < PROCESSING_STUCK_MS) return;
  try{
    const idx=Number(state.current_index||0);
    // processing이 남아있으면 같은 라운드를 마저 처리해서 낙찰/유찰 후 다음 선수로 넘깁니다.
    await completeRoundAndMove(idx, 'recovery');
    processingSeenAt=0;
    lastError='';
    await loadAll();
  }catch(e){
    console.warn('processing 강제 복구', e);
    try{
      const freshSold=await getFreshSoldTeams();
      let idx=Number(state.current_index||0);
      idx=nextUnsoldIndexFrom(idx, freshSold);
      if(idx<0) idx=nextUnsoldIndexFrom(-1, freshSold);
      if(idx>=0 && !allTeamsFullFrom(freshSold)){
        await sb.from('auction_state').update({status:'running',current_index:idx,round_started_at:nowIso(),paused_remaining:ROUND_SECONDS}).eq('id',1);
      }else{
        await sb.from('auction_state').update({status:'ended',round_started_at:null,paused_remaining:0}).eq('id',1);
      }
      processingSeenAt=0;
      lastError='';
      await loadAll();
    }catch(e2){showErr('처리중 복구 실패',e2)}
  }
}


async function boot(){
  try{
    render();
    await visitorHeartbeat();
    await ensureData();
    await loadAll();
    if(state.status==='processing') recoverProcessingIfStuck(true);
    sb.channel('auction-live').on('postgres_changes',{event:'*',schema:'public'},()=>loadAll()).subscribe();
  setInterval(()=>{
    try{
      if(finishRoundPromise && finishStartedAt && Date.now()-finishStartedAt>1800){
        finishRoundPromise=null; finishStartedAt=0; finishing=false;
        recoverProcessingIfStuck();
      }
      const rem=remainingSeconds();
      if(state.status==='running'){
        const roundKey=`${state.current_index}_${state.round_started_at||''}`;
        if(rem===6 && lastRoundKeyForCountSound!==roundKey){
          lastRoundKeyForCountSound=roundKey;
          playSound('count');
        }
        if(rem<=0){
          if(!finishRoundPromise){
            if(!isEditing()) render();
            finishStartedAt=Date.now();
            finishRoundPromise=finishRound().finally(()=>{finishRoundPromise=null; finishStartedAt=0;});
          }else if(!isEditing()) render();
        }else{
          processingSeenAt=0;
          if(!isEditing()) render();
        }
      }else if(state.status==='processing'){
        recoverProcessingIfStuck();
        if(!isEditing()) render();
      }else{
        processingSeenAt=0;
        if(!isEditing()) render();
      }
    }catch(e){console.error(e)}
  },250);
    setInterval(()=>{
      visitorHeartbeat();
      if(me) heartbeat();
      loadVisitorCount().then(()=>{ if(!isEditing() && !finishing) render(); }).catch(()=>{});
    },4000);
  }catch(e){
    console.error('boot failed',e);
    lastError='초기 로딩 실패: '+(e.message||e);
    render();
  }
}
boot();
